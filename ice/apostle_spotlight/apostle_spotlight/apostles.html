<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        #box {
            background: blue; 
            height: 700px;
            width: 800px;
            background-image: url("images/christus.webp");
            background-position: left;
        }
        .spotlight {
            border-width: 10px;
            border-style: solid;
            border-color: white;
            width: 80px;
            height: 80px; 
            border-radius: 50%;
            overflow: hidden;
            display: inline-block;
        }
        .spotlight img{
            width: 80px;

        }
        .first_pres {
            width: 100px;
            height: 100px;
        }
        .first_pres img{
            width: 100px;
        }

        
    </style>
</head>
<body>
    <div id="box">
        <div class="spotlight">
            <img src="images/gong.webp" alt="Elder_Gong">
        </div>
        <div class="spotlight">
            <img src="images/anderson.webp" alt="Elder_Anderson">
        </div>
        <div class="spotlight">
            <img src="images/uchtdorf.webp" alt="Elder_Uchtdorf">
        </div>
        <div class="spotlight">
            <img src="images/bednar.webp" alt="Elder_Bednar">
        </div>
        <div class="spotlight">
            <img src="images/cook.webp" alt="Elder_Cook">
        </div>
        <div class="spotlight first_pres">
            <img src="images/eyring.webp" alt="President_Eyring">
        </div>
        
    </div>
</body>
</html>
